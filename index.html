
<style>
  :root { --main: #020617; --accent: #fbbf24; --blue: #2563eb; --card: #1e293b; }
  body { background: var(--main); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 120px; }
  .container { padding: 15px; max-width: 600px; margin: auto; }
  .card { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #334155; }
  #modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); display: none; z-index: 9999; padding: 20px; box-sizing: border-box; overflow-y: auto; }
  .modal-btn { display: block; width: 100%; padding: 15px; margin: 10px 0; background: var(--blue); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; }
  #tv-bar { position: fixed; bottom: 0; left: 0; width: 100%; z-index: 5000; }
  .main-bar { height: 75px; background: #000; display: flex; align-items: center; border-top: 2px solid var(--accent); }
</style>

<div class="container">
  <div id="setup-view" class="card">
    <h3 style="color:var(--accent)">🏏 Cricket Match Setup</h3>
    <input type="text" id="t-name" placeholder="Team Name" style="width:100%; padding:10px; margin:5px 0; border-radius:5px;">
    <button onclick="startMatch()" class="modal-btn">Start Match</button>
  </div>
  <div id="score-view" style="display:none;">
    <div class="card" style="display:grid; grid-template-columns: repeat(4, 1fr); gap:8px;">
      <button class="modal-btn" style="margin:0" onclick="ball(0)">0</button>
      <button class="modal-btn" style="margin:0" onclick="ball(1)">1</button>
      <button class="modal-btn" style="margin:0; background:var(--accent); color:#000;" onclick="ball(4)">4</button>
      <button class="modal-btn" style="margin:0; background:var(--accent); color:#000;" onclick="ball(6)">6</button>
      <button class="modal-btn" style="margin:0; grid-column: span 2; background:#dc2626;" onclick="ball('W')">WICKET</button>
      <button class="modal-btn" style="margin:0; grid-column: span 2; background:#059669" onclick="undo()">UNDO</button>
    </div>
  </div>
</div>

<div id="tv-bar" style="display:none;">
  <div class="main-bar">
    <div style="flex:1; padding-left:15px;">
      <div id="ui-team" style="font-size:10px; color:var(--accent);">TEAM</div>
      <div style="font-size:24px; font-weight:900;"><span id="ui-r">0</span>-<span id="ui-w">0</span> <span style="font-size:12px;">(<span id="ui-o">0.0</span>)</span></div>
    </div>
  </div>
</div>

<script>
let m = { r:0, w:0, b:0, hist:[] };
function startMatch() {
  document.getElementById('setup-view').style.display='none';
  document.getElementById('score-view').style.display='block';
  document.getElementById('tv-bar').style.display='block';
  document.getElementById('ui-team').innerText = document.getElementById('t-name').value || "LIVE";
}
function ball(v) {
  m.hist.push(JSON.stringify(m));
  if(v==='W') m.w++; else m.r+=v;
  m.b++; updateUI();
}
function undo() { if(m.hist.length>0) { m = JSON.parse(m.hist.pop()); updateUI(); } }
function updateUI() {
  document.getElementById('ui-r').innerText = m.r;
  document.getElementById('ui-w').innerText = m.w;
  document.getElementById('ui-o').innerText = Math.floor(m.b/6) + "." + (m.b%6);
}
</script>
